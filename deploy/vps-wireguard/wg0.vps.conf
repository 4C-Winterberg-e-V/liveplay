# =====================================================================
# WireGuard — VPS side (the "server" peer). Install on the VPS as
# /etc/wireguard/wg0.conf, then:  systemctl enable --now wg-quick@wg0
#
# The VPS has a public IP and listens on UDP 51820. The Mac dials in and gets
# tunnel IP 10.10.0.2; the VPS reaches the Mac's LivePlay at 10.10.0.2:4480.
# No full-tunnel routing — only the 10.10.0.0/24 subnet rides the tunnel.
# =====================================================================
[Interface]
Address = 10.10.0.1/24
ListenPort = 51820
PrivateKey = <VPS_PRIVATE_KEY>       # wg genkey

[Peer]
# The Mac running LivePlay
PublicKey = <MAC_PUBLIC_KEY>         # public key derived from the Mac's private key
AllowedIPs = 10.10.0.2/32
