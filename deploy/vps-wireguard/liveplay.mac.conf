# =====================================================================
# WireGuard — Mac side (the dial-in peer). Import this into the official
# WireGuard macOS app (App Store): "Import tunnel(s) from file".
#
# This is NOT dev software — it's a normal VPN client. Only the 10.10.0.0/24
# tunnel subnet is routed through WireGuard; the Mac's normal LAN and internet
# are untouched. PersistentKeepalive holds the tunnel open through NAT so the
# VPS can always reach the Mac.
#
# The LivePlay server keeps running as usual (binds 0.0.0.0:4480), so it is
# reachable from the VPS at 10.10.0.2:4480 once the tunnel is up. If macOS
# prompts to allow incoming connections for LivePlay, choose "Allow".
# =====================================================================
[Interface]
Address = 10.10.0.2/32
PrivateKey = <MAC_PRIVATE_KEY>       # wg genkey

[Peer]
PublicKey = <VPS_PUBLIC_KEY>         # public key derived from the VPS's private key
Endpoint = <VPS_PUBLIC_IP>:51820
AllowedIPs = 10.10.0.1/32
PersistentKeepalive = 25
