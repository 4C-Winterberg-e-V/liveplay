# =====================================================================
# Traefik DYNAMIC configuration (file provider) for the VPS deployment.
#
# Routes the control API and WebSocket to the Mac's LivePlay server, reached
# over the WireGuard tunnel (the Mac's tunnel IP, NOT a container). Point your
# Traefik file provider at this file, e.g. in traefik.yml (static config):
#
#   providers:
#     file:
#       filename: /etc/traefik/dynamic/liveplay-dynamic.yml
#       watch: true
#
# Adjust the Host(...) rule, the certResolver, and the WireGuard upstream IP.
# =====================================================================
http:
  routers:
    liveplay-api:
      # Match API + WebSocket before the SPA catch-all.
      rule: "Host(`music.4cwt.de`) && (PathPrefix(`/api`) || Path(`/ws`))"
      entryPoints:
        - websecure
      service: liveplay-mac
      priority: 100
      tls:
        certResolver: le
      # Password gate at the proxy — protects the API/WS regardless of how the
      # origin is reached (via Cloudflare OR directly by IP). The SPA router
      # (in docker-compose.yml) references the same middleware as
      # `liveplay-auth@file`, so the whole site is gated.
      middlewares:
        - liveplay-auth

  services:
    liveplay-mac:
      loadBalancer:
        # The Mac's LivePlay server over WireGuard. Traefik forwards the
        # WebSocket upgrade on /ws automatically.
        servers:
          - url: "http://10.10.0.2:4480"

  middlewares:
    liveplay-auth:
      basicAuth:
        # Default login — user "liveplay", password "changeme". CHANGE THIS!
        # Generate a new hash (bcrypt) with either:
        #   htpasswd -nbB <user> '<password>'
        #   python3 -c "import crypt;print(crypt.crypt('PW',crypt.mksalt(crypt.METHOD_BLOWFISH)))"
        # In this FILE provider the hash is used verbatim (no $-escaping needed).
        users:
          - "liveplay:$2b$12$sD/KrOOp8iay7DpcMpGz9.WpwHG1gYp5oBj0gIL//hsnBhE2aTxwy"

