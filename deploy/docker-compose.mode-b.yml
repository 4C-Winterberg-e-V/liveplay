# =====================================================================
# Mode B — Plain-HTTP direct (Event-LAN).
#
# Serves the LivePlay SPA over plain HTTP. The operator enters the server
# address manually in the UI as  http://<server-ip>:4480 . No HTTPS, no proxy,
# so there is no mixed-content trap.
#
#   docker compose -f deploy/docker-compose.mode-b.yml up --build
#
# Then open  http://<this-host-ip>:8080  on any device in the same LAN.
# =====================================================================
services:
  liveplay-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: liveplay-web:modeb
    ports:
      - "8080:80"
    restart: unless-stopped
