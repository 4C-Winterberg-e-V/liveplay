# LivePlay web client — nginx static hosting (Mode B).
# Plain HTTP only: the SPA is served over http:// and the operator points it at
# the C++ server via http://<server-ip>:4480. No proxying here — that keeps the
# page and the API on the same scheme (http↔http) and avoids mixed content.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path resolves to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
