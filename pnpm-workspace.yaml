# pnpm workspace — replaces the former package.json "workspaces" field.
# The C++ server (server/) is not an npm package. The Electron client and the
# public docs site are both pnpm packages and built by their own workflows.
packages:
  - client
  - docs-site

# Dependencies allowed to run install/build (lifecycle) scripts. pnpm 10 gates
# these by default and reads the list from here (pnpm <10 read package.json's
# pnpm.onlyBuiltDependencies). These download their binaries on install.
onlyBuiltDependencies:
  - electron
  - esbuild
  - cloudflared
  - '@ffmpeg-installer/ffmpeg'
  - '@ffprobe-installer/ffprobe'
